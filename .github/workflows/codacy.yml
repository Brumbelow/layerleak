# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow checks out code, performs a Codacy security scan
# and integrates the results with the
# GitHub Advanced Security code scanning feature.  For more information on
# the Codacy security scan action usage and parameters, see
# https://github.com/codacy/codacy-analysis-cli-action.
# For more information on Codacy Analysis CLI in general, see
# https://github.com/codacy/codacy-analysis-cli.

name: Codacy Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]


permissions:
  contents: read

jobs:
  codacy-security-scan:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository to the GitHub Actions runner
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647

      # Post-process SARIF so each of Codacy's per-tool runs gets a unique
      # automationDetails.id — required since github/codeql-action@v4 enforces
      # "one run per category" (GitHub Code Scanning policy, 2025-07-21).
      # See https://github.com/codacy/codacy-analysis-cli-action/issues/142
      - name: Combine SARIF runs by tool name
        if: hashFiles('results.sarif') != ''
        run: |
          jq '.runs |= (
            group_by(.tool.driver.name) |
            map(
              . as $group |
              .[0] as $first |
              $first + {
                "automationDetails": (($first.automationDetails // {}) + { "id": ("Codacy/" + $first.tool.driver.name) }),
                "results": ([$group[].results[]] | unique),
                "artifacts": ([$group[].artifacts // [] | .[]] | unique),
                "invocations": [
                  (
                    reduce $group[].invocations[] as $item ({}; . + $item) |
                    . + { "executionSuccessful": ([$group[].invocations[].executionSuccessful] | all) }
                  )
                ]
              }
            )
          )' results.sarif > results-combined.sarif

      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('results-combined.sarif') != ''
        with:
          sarif_file: results-combined.sarif
          category: Codacy
          wait-for-processing: true
