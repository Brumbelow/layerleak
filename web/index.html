<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>layerleak</title>
    <meta
      name="description"
      content="Redirecting to the layerleak GitHub repository. Documentation lives under /docs."
    />
    <meta http-equiv="refresh" content="0; url=https://github.com/brumbelow/layerleak" />
    <link rel="canonical" href="https://github.com/brumbelow/layerleak" />
    <script>
      window.location.replace("https://github.com/brumbelow/layerleak");
    </script>
    <style>
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: #f4efe5;
        color: #1a1713;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      article {
        max-width: 36rem;
        padding: 2rem;
        border: 1px solid rgba(26, 23, 19, 0.12);
        border-radius: 1rem;
        background: rgba(255, 251, 244, 0.92);
        box-shadow: 0 24px 48px rgba(26, 23, 19, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      a {
        color: #8f2d12;
      }
    </style>
  </head>
  <body>
    <main>
      <article>
        <h1>Redirecting to GitHub</h1>
        <p>
          The root Pages URL now redirects to
          <a href="https://github.com/brumbelow/layerleak">github.com/brumbelow/layerleak</a>.
        </p>
        <p>
          Documentation lives at <a href="./docs/">brumbelow.github.io/layerleak/docs</a> and the
          simulated browser demo lives under that docs site.
        </p>
      </article>
    </main>
  </body>
</html>
