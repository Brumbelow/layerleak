name: Analyze

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  go:
    name: Analyze (go)
    runs-on: ubuntu-latest
    env:
      GOBIN: ${{ runner.temp }}/bin
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - run: go test ./...
      - run: go install .
      - run: "$GOBIN/layerleak" --help
      - run: go vet ./...
